services:
  postgres-test:
    image: postgres:14-alpine
    container_name: popc-postgres-test
    environment:
      POSTGRES_DB: popc_test
      POSTGRES_USER: popc
      POSTGRES_PASSWORD: popc_password
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U popc -d popc_test"]
      interval: 2s
      timeout: 2s
      retries: 20
